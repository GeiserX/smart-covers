name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7

      - name: Get version and check tag
        id: check
        run: |
          VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' SmartCovers/SmartCovers.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag v${VERSION} already exists — skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [check-version]
    if: github.event_name == 'pull_request' || needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SmartCovers/SmartCovers.csproj

      - name: Build
        run: dotnet publish SmartCovers/SmartCovers.csproj -c Release --no-restore -o publish

      - name: Test with coverage
        run: dotnet test SmartCovers.Tests/SmartCovers.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: SmartCovers.Tests/TestResults/*/coverage.cobertura.xml
          fail_ci_if_error: false

      - name: Merge SharpCompress into SmartCovers.dll (ILRepack)
        run: |
          # Jellyfin 10.11 servers ship no SharpCompress, and the plugin scanner's
          # GetTypes() pass resolves compiler-generated fields BEFORE any plugin
          # code (or Resolving handler) can run — an external SharpCompress
          # reference therefore marks the plugin NotSupported at load time.
          # Internalizing the library into SmartCovers.dll removes the external
          # reference entirely, on every Jellyfin version.
          dotnet tool install -g dotnet-ilrepack
          NETCORE_LIB=$(dotnet --list-runtimes | awk '$1=="Microsoft.NETCore.App"{v=$2; p=$3} END{gsub(/[][]/,"",p); print p "/" v}')
          ASPNET_LIB=$(dotnet --list-runtimes | awk '$1=="Microsoft.AspNetCore.App"{v=$2; p=$3} END{gsub(/[][]/,"",p); print p "/" v}')
          LIBS=(/lib:publish "/lib:$NETCORE_LIB" "/lib:$ASPNET_LIB")
          for d in \
            "$HOME/.nuget/packages/jellyfin.controller/10.11.0/lib/net9.0" \
            "$HOME/.nuget/packages/jellyfin.model/10.11.0/lib/net9.0" \
            "$HOME/.nuget/packages/jellyfin.data/10.11.0/lib/net9.0" \
            $HOME/.nuget/packages/microsoft.extensions.logging.abstractions/*/lib/net9.0; do
            [ -d "$d" ] && LIBS+=("/lib:$d")
          done
          mkdir -p merged
          "$HOME/.dotnet/tools/ilrepack" /internalize \
            /out:merged/SmartCovers.dll \
            publish/SmartCovers.dll publish/SharpCompress.dll \
            "${LIBS[@]}"
          ls -la merged/

      - name: Test the merged assembly without SharpCompress present
        run: |
          # Regression gate for the NotSupported bug class: the merged DLL must
          # pass the entire suite with NO SharpCompress.dll available anywhere.
          BIN=SmartCovers.Tests/bin/Release/net9.0
          cp merged/SmartCovers.dll "$BIN/SmartCovers.dll"
          rm -f "$BIN/SharpCompress.dll"
          dotnet test SmartCovers.Tests/SmartCovers.Tests.csproj --configuration Release --no-build --verbosity minimal

      - name: Get version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' SmartCovers/SmartCovers.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create plugin package
        run: |
          mkdir -p release
          # The MERGED assembly (SharpCompress internalized) is what ships — see
          # the ILRepack step above for why a separate SharpCompress.dll would
          # break Jellyfin 10.11's plugin scan.
          cp merged/SmartCovers.dll release/
          # Rename PDFtoImage.dll to .lib so Jellyfin's plugin scanner won't
          # try to load it as a managed assembly (it rejects the SkiaSharp
          # version mismatch). Plugin.cs registers a resolver at runtime.
          cp publish/PDFtoImage.dll release/PDFtoImage.lib
          # Redistribution of the bundled MIT/BSD components (including the
          # SharpCompress code merged into SmartCovers.dll) requires their
          # notices to travel with the binaries.
          cp THIRD-PARTY-NOTICES.md release/
          # SkiaSharp is intentionally NOT bundled — Jellyfin already ships it (≥ 3.116.1).
          # PDFtoImage 5.2.1 requires SkiaSharp >= 3.116.1 which Jellyfin satisfies.
          # Bundling a second copy would cause assembly-loading conflicts at runtime.
          #
          # Bundle native pdfium libraries for ALL platforms — Linux (.so),
          # macOS (.dylib) AND Windows (pdfium.dll). Windows natives are now
          # included: Jellyfin's plugin loader recursively scans for *.dll and
          # would try to load pdfium.dll as a managed assembly, but the
          # "assemblies" whitelist in meta.json (written below) restricts loading
          # to SmartCovers.dll only, so the native pdfium.dll is ignored instead
          # of fatally disabling the plugin. The Windows pdfium.dll is statically
          # linked against the CRT, so no Visual C++ Redistributable is required.
          #
          # NOTE: `dotnet publish` here is framework-dependent (no -r), yet it
          # still lays down every RID's native assets under publish/runtimes/,
          # including win-x64, win-x86 and win-arm64 pdfium.dll. These come from
          # the bblanchon.PDFium.* NuGet package's runtimes/ folder (resolved at
          # restore, host-independent), so no <RuntimeIdentifiers> and no
          # NuGet-cache copy step are needed.
          find publish/runtimes \( -name "libpdfium*" -o -name "pdfium.dll" \) | while read f; do
            rel="${f#publish/}"
            mkdir -p "release/$(dirname "$rel")"
            cp "$f" "release/$rel"
          done
          cp build.yaml release/
          # Write meta.json into the zip with an "assemblies" whitelist.
          # Jellyfin's PluginManager loads ONLY the assemblies listed here and
          # skips every other *.dll in the plugin folder (including the native
          # pdfium.dll). On a catalog install the zip is extracted first, then
          # ReconcileManifest copies this "assemblies" array verbatim into the
          # generated meta.json (the catalog manifest.json has no assemblies
          # field); on a sideload the bundled meta.json is read as-is. The guid
          # MUST match the catalog entry and every listed path MUST exist in the
          # zip, or Jellyfin marks the plugin Malfunctioned.
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > release/meta.json << EOF
          {
            "guid": "82eef869-3f18-4678-968d-06efc10b60cf",
            "name": "SmartCovers",
            "version": "${VERSION}",
            "targetAbi": "10.11.0.0",
            "framework": "net9.0",
            "owner": "GeiserX",
            "overview": "Cover extraction for books, audiobooks, comics, and music — with online fallback via Open Library & Google Books.",
            "description": "Cover provider for Jellyfin libraries. Renders PDF first pages via built-in PDFium (no external tools needed), searches EPUB archives for cover images, extracts the first page from CBZ/CBR comic archives, and extracts embedded artwork from audio files via ffmpeg. When local extraction fails, automatically fetches covers from Open Library and Google Books as a last resort.",
            "category": "General",
            "timestamp": "${TIMESTAMP}",
            "assemblies": [
              "SmartCovers.dll"
            ]
          }
          EOF
          python3 -c "import json; json.load(open('release/meta.json'))"
          echo "meta.json is valid JSON"
          cd release && zip -r ../smart-covers_${{ steps.version.outputs.version }}.zip .

      - name: Calculate checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum smart-covers_${{ steps.version.outputs.version }}.zip | cut -d ' ' -f 1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > manifest.json << EOF
          [
            {
              "guid": "82eef869-3f18-4678-968d-06efc10b60cf",
              "name": "SmartCovers",
              "overview": "Cover extraction for books, audiobooks, comics, and music — with online fallback via Open Library & Google Books.",
              "description": "Cover provider for Jellyfin libraries. Renders PDF first pages via built-in PDFium (no external tools needed), searches EPUB archives for cover images, extracts the first page from CBZ/CBR comic archives, and extracts embedded artwork from audio files via ffmpeg. When local extraction fails, automatically fetches covers from Open Library and Google Books as a last resort.",
              "owner": "GeiserX",
              "category": "General",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "See https://github.com/GeiserX/smart-covers/releases",
                  "targetAbi": "10.11.0.0",
                  "sourceUrl": "https://github.com/GeiserX/smart-covers/releases/download/v${VERSION}/smart-covers_${VERSION}.zip",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF
          python3 -c "import json; json.load(open('manifest.json'))"
          echo "manifest.json is valid JSON"

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SmartCovers v${{ steps.version.outputs.version }}
          files: smart-covers_${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v5
