name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SmartCovers/SmartCovers.csproj

      - name: Build
        run: dotnet build SmartCovers/SmartCovers.csproj -c Release --no-restore

      - name: Create plugin package
        run: |
          mkdir -p artifacts
          cp SmartCovers/bin/Release/net9.0/SmartCovers.dll artifacts/
          cp build.yaml artifacts/
          cd artifacts && zip -r ../smart-covers.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-covers-plugin
          path: smart-covers.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: smart-covers-plugin

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SmartCovers v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: smart-covers.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          CHECKSUM=$(md5sum smart-covers.zip | awk '{print $1}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > manifest.json << EOF
          [
            {
              "guid": "82eef869-3f18-4678-968d-06efc10b60cf",
              "name": "SmartCovers",
              "overview": "Cover extraction for books, audiobooks, comics, and music — with online fallback via Open Library & Google Books.",
              "description": "Cover provider for Jellyfin libraries. Extracts PDF first pages via pdftoppm, searches EPUB archives for cover images, and extracts embedded artwork from audio files via ffmpeg. When local extraction fails, automatically fetches covers from Open Library and Google Books as a last resort.",
              "owner": "GeiserX",
              "category": "General",
              "imageUrl": "",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "See https://github.com/GeiserX/smart-covers/releases/tag/v${VERSION}",
                  "targetAbi": "10.11.0.0",
                  "sourceUrl": "https://github.com/GeiserX/smart-covers/releases/download/v${VERSION}/smart-covers.zip",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF

      - name: Commit manifest update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update manifest.json for v${{ steps.version.outputs.VERSION }}"
          file_pattern: manifest.json
          branch: main
          skip_checkout: true

  deploy-pages:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
