overview: "Cover extraction for books, audiobooks, comics, and music — with online fallback via Open Library & Google Books"
description: >
  Cover provider for Jellyfin libraries. Renders PDF first pages via built-in PDFium,
  searches EPUB archives for cover images, and extracts embedded artwork from audio
  files via ffmpeg. When local extraction fails, automatically fetches covers from
  Open Library and Google Books as a last resort. No external tools required for PDF
  or EPUB extraction. Supports folder-based audiobooks, sidecar images, and handles
  mislabeled codec tags in ID3.
category: "General"
